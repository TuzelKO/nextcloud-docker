output_buffering = Off
ignore_user_abort = On
zend.exception_string_param_max_len = 0
expose_php = Off
max_execution_time = 86400
max_input_time = 600
memory_limit = 512M
display_errors = Off
log_errors = On
post_max_size = 100G
upload_max_filesize = 100G
max_file_uploads = 1000
apc.enable_cli = 1
opcache.interned_strings_buffer = 32